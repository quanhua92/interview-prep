services:
  web:
    container_name: interview-prep
    build: .
    ports:
      - "8888:8888"
    environment:
      - WASM_SANDBOX=auto  # auto | 1 (force wasm) | 0 (force native)
      # WASMTIME_BIN=wasmtime
      # WASI_SDK_CLANG=/opt/wasi-sdk/bin/clang
      # WASI_SDK_CLANGPP=/opt/wasi-sdk/bin/clang++
      # WASI_SDK_SYSROOT=/opt/wasi-sdk/share/wasi-sysroot
      # JAVY_BIN=javy
      # PYTHON_WASM=/opt/python-wasi/python.wasm
      # PYTHON_WASM_HOME=/opt/python-wasi
      # WASM_CACHE_DIR=/tmp/wasm-cache
    volumes:
      - ./progress:/app/progress
      - ./static:/app/static
      - ./src:/app/src
      - ./tier1_foundation:/app/tier1_foundation
      - ./tier2_intermediate:/app/tier2_intermediate
      - ./tier3_advanced:/app/tier3_advanced
      - ./tier4_expert:/app/tier4_expert
