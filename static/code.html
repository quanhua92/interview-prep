<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Editor</title>
  <script src="/static/tailwind-browser.js"></script>
  <link rel="stylesheet" href="/static/codemirror/codemirror.min.css">
  <link rel="stylesheet" href="/static/codemirror/material-darker.min.css">
  <link rel="stylesheet" href="/static/codemirror/show-hint.min.css">
  <link rel="stylesheet" href="/static/codemirror/foldgutter.min.css">
  <script src="/static/codemirror/codemirror.min.js"></script>
  <script src="/static/codemirror/simple.min.js"></script>
  <script src="/static/codemirror/clike.min.js"></script>
  <script src="/static/codemirror/javascript.min.js"></script>
  <script src="/static/codemirror/python.min.js"></script>
  <script src="/static/codemirror/rust.min.js"></script>
  <script src="/static/codemirror/show-hint.min.js"></script>
  <script src="/static/codemirror/anyword-hint.min.js"></script>
  <script src="/static/codemirror/comment.min.js"></script>
  <script src="/static/codemirror/closebrackets.min.js"></script>
  <script src="/static/codemirror/matchbrackets.min.js"></script>
  <script src="/static/codemirror/foldcode.min.js"></script>
  <script src="/static/codemirror/foldgutter.min.js"></script>
  <script src="/static/codemirror/indent-fold.min.js"></script>
  <script src="/static/python-hint.js"></script>
  <script src="/static/c-hint.js"></script>
  <script src="/static/cpp-hint.js"></script>
  <script src="/static/rust-hint.js"></script>
  <script src="/static/javascript-hint.js"></script>
  <script src="/static/codemirror/markdown.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #09090b;
    }
  </style>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/code.css">
</head>
  <body class="bg-bg text-white antialiased overflow-hidden h-dvh">

  <!-- Code Editor (same IDs as index.html) -->
  <div id="editor-card" class="bg-zinc-900 h-full flex flex-col layout-right">
    <div class="px-4 py-2 border-b border-zinc-800 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-blue-500"></span>
        <h2 class="text-lg font-bold text-white" id="editor-title">Code Editor</h2>
      </div>
      <div class="flex items-center gap-2" id="editor-actions">
        <button id="hint-btn" onclick="toggleHint()" title="Show Solution"
          class="px-4 py-2 rounded-lg text-sm bg-purple-600 hover:bg-purple-500 text-white cursor-pointer font-medium flex items-center gap-2">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
          </svg>
          <span id="hint-label">Hint</span>
        </button>
        <button id="save-btn" onclick="saveFile()" title="Ctrl+S"
          class="px-4 py-2 rounded-lg text-sm bg-zinc-700 hover:bg-zinc-600 text-white cursor-pointer font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 17H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v7a2 2 0 01-2 2z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 3v4h4"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 17v4"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h6"/>
          </svg>
          <span id="save-label">Saved</span>
        </button>
        <button id="run-btn" onclick="runProblems()" title="Ctrl+R"
          class="px-4 py-2 rounded-lg text-sm bg-emerald-600 hover:bg-emerald-500 text-white cursor-pointer font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Run
        </button>
      </div>
    </div>
    <div id="editor-body" class="flex flex-1 min-h-0">
      <!-- Activity bar (same IDs as index.html) -->
      <div id="activity-bar" class="w-10 shrink-0 border-r border-zinc-800 flex flex-col items-center py-2 gap-1">
        <button onclick="toggleFileTree()" title="Explorer"
          id="explorer-btn"
          class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
          </svg>
        </button>
        <button onclick="revertFile()" title="Version history"
          id="history-btn"
          class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-orange-300 hover:bg-zinc-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
          </svg>
        </button>
        <button onclick="toggleSettings()" title="Settings"
          id="settings-btn"
          class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-purple-400 hover:bg-zinc-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a6.759 6.759 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
        <div class="flex-1"></div>
        <button onclick="window.location='/'" title="Dashboard"
          class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-emerald-400 hover:bg-zinc-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
          </svg>
        </button>
      </div>
      <!-- File tree panel (same ID as index.html) -->
      <div id="file-tree" class="w-48 shrink-0 border-r border-zinc-800 py-2 overflow-y-auto text-xs font-mono hidden min-h-0"></div>
      <!-- Editor + Terminal (flex column, terminal below editor) -->
      <div id="editor-main" class="flex-1 flex flex-col min-h-0 min-w-0">
        <div class="flex-1 p-4 min-h-0 relative">
          <div id="code-editor" class="h-full"></div>
        </div>
        <!-- Terminal (same ID for terminal-body as index.html) -->
        <div id="terminal-panel" class="border-t border-zinc-800 shrink-0">
          <div class="px-4 py-2 border-b border-zinc-800 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2">
              <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
              <span class="text-sm font-bold text-white">Terminal</span>
            </div>
            <button id="hide-terminal-btn" onclick="(()=>{const s=JSON.parse(localStorage.getItem('code-settings')||'{}');s.termVisible=false;localStorage.setItem('code-settings',JSON.stringify(s));document.getElementById('terminal-panel').classList.add('auto-hidden');if(cmEditor)setTimeout(()=>cmEditor.refresh(),50)})()" title="Hide terminal"
              class="w-8 h-8 flex items-center justify-center rounded text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800 cursor-pointer">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
              </svg>
            </button>
          </div>
          <div id="terminal-body" class="px-4 py-3 font-mono text-sm leading-relaxed"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/editor-core.js"></script>
  <script src="/static/code.js"></script>
</body>
</html>
