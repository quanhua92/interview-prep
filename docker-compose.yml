services:
  web:
    container_name: interview-prep
    image: quanhua92/interview-prep:latest
    # build: .  # uncomment to build locally instead of pulling from Docker Hub
    ports:
      - "8888:8888"
    init: true
    restart: unless-stopped
    environment:
      - WASM_SANDBOX=auto  # auto | 1 (force wasm) | 0 (force native)
      # WASMTIME_BIN=wasmtime
      # WASI_SDK_CLANG=/opt/wasi-sdk/bin/clang
      # WASI_SDK_CLANGPP=/opt/wasi-sdk/bin/clang++
      # WASI_SDK_SYSROOT=/opt/wasi-sdk/share/wasi-sysroot
      # JAVY_BIN=javy
      # PYTHON_WASM=/opt/python-wasi/python.cwasm
      # WASM_CACHE_DIR=/tmp/wasm-cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - .:/app
      - /app/.venv  # exclude host .venv — container uses its own
