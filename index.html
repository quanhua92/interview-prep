<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Prep Dashboard</title>
  <script src="/static/tailwind-browser.js"></script>
  <link rel="stylesheet" href="/static/codemirror/codemirror.min.css">
  <link rel="stylesheet" href="/static/codemirror/material-darker.min.css">
  <link rel="stylesheet" href="/static/codemirror/show-hint.min.css">
  <link rel="stylesheet" href="/static/codemirror/foldgutter.min.css">
  <script src="/static/codemirror/codemirror.min.js"></script>
  <script src="/static/codemirror/python.min.js"></script>
  <script src="/static/codemirror/show-hint.min.js"></script>
  <script src="/static/codemirror/anyword-hint.min.js"></script>
  <script src="/static/codemirror/comment.min.js"></script>
  <script src="/static/codemirror/closebrackets.min.js"></script>
  <script src="/static/codemirror/matchbrackets.min.js"></script>
  <script src="/static/codemirror/foldcode.min.js"></script>
  <script src="/static/codemirror/foldgutter.min.js"></script>
  <script src="/static/codemirror/indent-fold.min.js"></script>
  <script src="/static/python-hint.js"></script>
  <script src="/static/codemirror/markdown.min.js"></script>
  <style type="text/tailwindcss">
    @theme {{
      --color-bg: #09090b;
    }}
  </style>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-bg min-h-screen text-white antialiased">
  <div class="max-w-6xl mx-auto px-6 py-12">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row items-start sm:items-start justify-between mb-12 gap-4">
      <div>
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Interview Prep</h1>
        <p class="text-zinc-400">{subtitle}</p>
      </div>
      <div class="relative flex items-center justify-center w-full sm:w-auto">
        {progress_ring}
        <div class="absolute text-center">
          <div class="text-4xl sm:text-2xl font-bold">{pct}%</div>
          <div class="text-sm sm:text-[10px] text-zinc-500 uppercase tracking-wider">Overall</div>
        </div>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
      <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-5 text-center">
        <div class="text-3xl font-extrabold text-white">{total}</div>
        <div class="text-xs text-zinc-500 uppercase tracking-wider mt-1">Total Topics</div>
      </div>
      <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-5 text-center">
        <div class="text-3xl font-extrabold text-emerald-400">{done}</div>
        <div class="text-xs text-zinc-500 uppercase tracking-wider mt-1">Completed</div>
      </div>
      <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-5 text-center">
        <div class="text-3xl font-extrabold text-amber-400">{prog}</div>
        <div class="text-xs text-zinc-500 uppercase tracking-wider mt-1">In Progress</div>
      </div>
      <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-5 text-center">
        <div class="text-3xl font-extrabold text-zinc-400">{remaining}</div>
        <div class="text-xs text-zinc-500 uppercase tracking-wider mt-1">Remaining</div>
      </div>
    </div>

    <!-- Section Summary Cards -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-12">
      {summary_cards}
    </div>

    <!-- Code Editor -->
    <div id="editor-card" class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden mb-8 hidden">
      <div class="px-4 sm:px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-blue-500"></span>
          <h2 class="text-lg font-bold text-white" id="editor-title">Editor</h2>
          <button onclick="toggleEditorBody()" id="editor-toggle-btn" title="Collapse"
            class="w-6 h-6 flex items-center justify-center rounded text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800 cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="toggle-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/>
            </svg>
          </button>
        </div>
        <div class="flex items-center gap-2" id="editor-actions">
          <button id="save-btn" onclick="saveFile()" title="Ctrl+S"
            class="px-4 py-2 rounded-lg text-sm bg-blue-600 hover:bg-blue-500 text-white cursor-pointer font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 17H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v7a2 2 0 01-2 2z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M14 3v4h4"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 17v4"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h6"/>
            </svg>
            <span id="save-label">Save</span>
          </button>
          <button onclick="runProblems()" title="Ctrl+R"
            class="px-4 py-2 rounded-lg text-sm bg-emerald-600 hover:bg-emerald-500 text-white cursor-pointer font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            Run
          </button>
        </div>
      </div>
      <div id="editor-body" class="flex">
        <!-- Activity bar (VS Code style) -->
        <div id="activity-bar" class="w-10 shrink-0 border-r border-zinc-800 flex flex-col items-center py-2 gap-1">
          <button onclick="toggleFileTree()" title="Explorer"
            id="explorer-btn"
            class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
            </svg>
          </button>
          <button onclick="revertFile()" title="Version history"
            id="history-btn"
            class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-orange-300 hover:bg-zinc-800">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
            </svg>
          </button>
          <button onclick="toggleSettings()" title="Settings"
            id="settings-btn"
            class="w-8 h-8 flex items-center justify-center rounded cursor-pointer text-zinc-500 hover:text-purple-400 hover:bg-zinc-800">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a6.759 6.759 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
        <!-- File tree panel -->
        <div id="file-tree" class="w-48 shrink-0 border-r border-zinc-800 py-2 overflow-y-auto text-xs font-mono hidden"></div>
        <!-- Editor -->
        <div class="flex-1 p-4">
          <div id="code-editor"></div>
        </div>
      </div>
    </div>

    <!-- Run Terminal -->
    <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden mb-8">
      <div class="px-4 sm:px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          <h2 class="text-lg font-bold text-white">Terminal</h2>
        </div>
      </div>
      <div id="terminal-body" class="px-4 sm:px-6 py-4 max-h-[600px] overflow-y-auto font-mono text-sm leading-relaxed">
        <div class="text-zinc-500">Click "Run" to execute in-progress problem files...</div>
      </div>
    </div>

    <!-- Filter & Search Card -->
    <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden mb-8">
      <div class="px-4 sm:px-6 py-4 border-b border-zinc-800">
        <input id="search-input" type="text" placeholder="Search topics..."
          oninput="filterItems()"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500">
      </div>
      <div class="px-4 sm:px-6 py-3 flex items-center gap-3 text-xs sm:text-sm overflow-x-auto">
        <span class="text-zinc-500 font-medium whitespace-nowrap">Filter:</span>
        <label class="flex items-center gap-1 cursor-pointer whitespace-nowrap">
          <input type="checkbox" checked onchange="filterItems()" value="not_started" class="status-filter accent-zinc-500 w-3.5 h-3.5">
          <span class="text-zinc-400">New</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer whitespace-nowrap">
          <input type="checkbox" checked onchange="filterItems()" value="in_progress" class="status-filter accent-amber-500 w-3.5 h-3.5">
          <span class="text-amber-400">In Progress</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer whitespace-nowrap">
          <input type="checkbox" checked onchange="filterItems()" value="completed" class="status-filter accent-emerald-500 w-3.5 h-3.5">
          <span class="text-emerald-400">Done</span>
        </label>
      </div>
    </div>

    <!-- Sections Detail -->
    <div class="space-y-8">
      {sections_html}
    </div>

    <!-- Footer -->
    <div class="mt-16 text-center text-xs text-zinc-600">
      {footer}
    </div>

    <div class="mt-4 text-center">
      <button onclick="downloadTracker()"
        class="px-5 py-2.5 rounded-lg text-sm bg-blue-600 hover:bg-blue-500 text-white cursor-pointer font-medium">
        Download tracker.json
      </button>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
